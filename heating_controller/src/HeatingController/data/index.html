<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система управления отоплением</title>
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
            font-size: 14px;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 10px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        h2 {
            color: #34495e;
            border-bottom: 2px solid #bdbdbd;
            padding-bottom: 3px;
            margin-top: 5px;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }
        h3 {
            margin: 0;
            font-size: 0.9rem;
            color: #2c3e50;
        }
        
        /* Стили для контейнера канала */
        .channelContainer {
            margin: 0 0 10px;
            padding: 8px;
            background-color: #fff;
            border-radius: 6px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        
        /* Стили для отображения статуса */
        .channelStatus {
            display: flex;
            align-items: center;
            width: 100%;
            margin: 8px 0;
            padding: 4px;
            background-color: #f5f5f5;
            border-radius: 5px;
        }
        .statusBox {
            flex: 1;
            width: 100%;
            padding: 10px;
            margin-right: 10px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            font-size: 13px;
        }
        .statusOn {
            background-color: #43a047;
        }
        .statusOff {
            background-color: #e53935;
        }
        .statusWaiting {
            background-color: #757575;
        }
        .statusText {
            display: block;
            line-height: 1.3;
            width: 100%;
        }
        .paramGrid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
            margin-top: 5px;
            max-width: 380px;
            margin-left: 0;
            margin-right: auto;
        }
        .paramBox {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            padding: 5px;
            text-align: center;
        }
        .paramLabel {
            font-size: 11px;
            opacity: 0.9;
            margin-bottom: 2px;
            color: rgba(255, 255, 255, 1);
        }
        .paramValue {
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
        }
        .paramIcon {
            font-size: 16px;
            margin-bottom: 2px;
        }
        .relayOn {
            color: #ffffff;
            font-weight: bold;
        }
        .relayOff {
            color: #ffffff;
            font-weight: bold;
        }
        
        /* Стили для переключателя */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
            flex-shrink: 0;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
        }
        input:checked + .slider {
            background-color: #90caf9;
        }
        input:focus + .slider {
            box-shadow: 0 0 1px #90caf9;
        }
        input:checked + .slider:before {
            transform: translateX(22px);
        }
        .slider.round {
            border-radius: 28px;
        }
        .slider.round:before {
            border-radius: 50%;
        }
        input:disabled + .slider {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Стили для блока реле */
        .relayGroup {
            margin-top: 6px;
        }
        .relayRow {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px;
            background-color: #f5f5f5;
            border-radius: 6px;
            margin-top: 6px;
        }
        .relayRow.on {
            background-color: #e8f5e9;
        }
        .relayRow.off {
            background-color: #ffebee;
        }
        .relayMeta {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .relayName {
            font-weight: 600;
            font-size: 0.95rem;
            color: #2c3e50;
        }
        .relayTime {
            font-size: 0.9rem;
            font-weight: 600;
            color: #2c3e50;
        }
        .relayState {
            font-size: 0.8rem;
            color: #666;
            font-weight: 600;
        }
        .relayRoom {
            margin-left: 8px;
            font-weight: 600;
            color: #2c3e50;
        }

        /* Стили для температуры */
        .tempSummary {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            margin-bottom: 8px;
        }
        .tempCard {
            background-color: #f5f5f5;
            border-radius: 6px;
            padding: 8px;
        }
        .tempLabel {
            font-size: 0.8rem;
            color: #555;
            margin-bottom: 4px;
        }
        .tempValue {
            font-size: 1rem;
            font-weight: 600;
            color: #2c3e50;
        }
        .relayTemp {
            font-weight: 600;
            color: #2c3e50;
            margin-left: 6px;
            font-size: 0.9rem;
        }
        
        /* Стили для таблиц расписания */
        .scheduleTitle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            padding: 2px 4px;
            margin-top: 5px;
            margin-bottom: 0;
            border-top: 1px solid #eee;
            background-color: #f9f9f9;
            border-radius: 4px;
            font-size: 0.85em;
        }
        .scheduleTitle h3 {
            font-size: 0.8rem;
            margin: 0;
        }
        .scheduleTitle .toggleIcon {
            font-size: 14px;
            transition: transform 0.3s;
        }
        .scheduleContent {
            transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
            max-height: 2000px;
            opacity: 1;
            overflow: hidden;
            padding: 0 5px;
        }
        .scheduleContent.collapsed {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
            margin-bottom: 0;
            padding-top: 0;
            padding-bottom: 0;
        }
        .scheduleTable {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 13px;
        }
        .scheduleTable th, .scheduleTable td {
            border: 1px solid #ddd;
            padding: 6px 4px;
            text-align: center;
        }
        .scheduleTable th {
            background-color: #f2f2f2;
            font-size: 11px;
            font-weight: bold;
        }
        .tempDisplay, .timeDisplay {
            cursor: pointer;
            position: relative;
            padding: 2px 3px;
            border-radius: 3px;
        }
        .tempDisplay:hover, .timeDisplay:hover {
            background-color: #f5f5f5;
        }
        .tempInput, .timeInput {
            width: 55px;
            padding: 2px 3px;
            border: 1px solid #ccc;
            border-radius: 3px;
            text-align: center;
            font-size: 13px;
        }
        .deleteButton {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
        }
        .addScheduleForm {
            display: flex;
            flex-wrap: wrap;
            margin-bottom: 10px;
            gap: 5px;
        }
        .addScheduleForm select, .addScheduleForm input {
            padding: 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            flex-grow: 1;
            min-width: 60px;
        }
        .addScheduleForm button {
            padding: 6px 10px;
            background-color: #66bb6a;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            flex-grow: 1;
        }
        .addScheduleForm button:hover {
            background-color: #4caf50;
        }
        #message {
            position: fixed;
            bottom: 10px;
            right: 10px;
            padding: 8px 15px;
            border-radius: 5px;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 13px;
            max-width: 80%;
            z-index: 1000;
        }
        .success {
            background-color: #388e3c;
        }
        .error {
            background-color: #d32f2f;
        }
        .scheduleHint {
            margin: 8px 0;
            font-size: 0.75em;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Система управления отоплением -->
        <div class="channelContainer">
            <h2>Система управления отоплением</h2>
            <div class="tempSummary">
                <div class="tempCard">
                    <div class="tempLabel">Ввод теплоносителя</div>
                    <div class="tempValue" id="tempInputValue">--.-°C</div>
                </div>
            </div>
            <div class="relayGroup">
                <div class="relayRow off" id="relay1Row">
                    <div class="relayMeta">
                        <div class="relayName"><span id="relay1Name">Канал 1</span><span class="relayTemp" id="relay1Temp">--.-°C</span></div>
                        <div class="relayState"><span id="relay1StateText">Отключено</span><span class="relayRoom" id="relay1Room">--.-°C</span></div>
                        <div class="relayTime" id="relay1Time">00:00</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="relay1Toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="relayRow off" id="relay2Row">
                    <div class="relayMeta">
                        <div class="relayName"><span id="relay2Name">Канал 2</span><span class="relayTemp" id="relay2Temp">--.-°C</span></div>
                        <div class="relayState"><span id="relay2StateText">Отключено</span><span class="relayRoom" id="relay2Room">--.-°C</span></div>
                        <div class="relayTime" id="relay2Time">00:00</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="relay2Toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="relayRow off" id="relay3Row">
                    <div class="relayMeta">
                        <div class="relayName"><span id="relay3Name">Канал 3</span><span class="relayTemp" id="relay3Temp">--.-°C</span></div>
                        <div class="relayState"><span id="relay3StateText">Отключено</span><span class="relayRoom" id="relay3Room">--.-°C</span></div>
                        <div class="relayTime" id="relay3Time">00:00</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="relay3Toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="relayRow off" id="relay4Row">
                    <div class="relayMeta">
                        <div class="relayName"><span id="relay4Name">Канал 4</span><span class="relayTemp" id="relay4Temp">--.-°C</span></div>
                        <div class="relayState"><span id="relay4StateText">Отключено</span><span class="relayRoom" id="relay4Room">--.-°C</span></div>
                        <div class="relayTime" id="relay4Time">00:00</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="relay4Toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>
        </div>

        <div id="message"></div>
    </div>

    <script>
        // Локализуем тексты, используемые в уведомлениях
        function showMessage(text, type) {
            const messageElement = document.getElementById('message');
            messageElement.textContent = text;
            messageElement.className = type;
            messageElement.style.opacity = 1;
            
            setTimeout(() => {
                messageElement.style.opacity = 0;
            }, 3000);
        }

        const relayChannels = [
            { id: 'relay1', index: 0, name: 'Канал 1' },
            { id: 'relay2', index: 1, name: 'Канал 2' },
            { id: 'relay3', index: 2, name: 'Канал 3' },
            { id: 'relay4', index: 3, name: 'Канал 4' }
        ];

        function formatElapsedMs(ms) {
            const totalSeconds = Math.max(0, Math.floor(ms / 1000));
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function formatTemperature(value) {
            if (value === null || value === undefined) {
                return '--.-°C';
            }
            const numberValue = Number(value);
            if (Number.isNaN(numberValue)) {
                return '--.-°C';
            }
            return `${numberValue.toFixed(1)}°C`;
        }

        function updateRelayRow(channelId, isOn, elapsedMs, returnTemp, roomTemp) {
            const row = document.getElementById(channelId + 'Row');
            const timeElement = document.getElementById(channelId + 'Time');
            const stateElement = document.getElementById(channelId + 'StateText');
            const tempElement = document.getElementById(channelId + 'Temp');
            const roomElement = document.getElementById(channelId + 'Room');

            if (!row || !timeElement || !stateElement) {
                return;
            }

            row.classList.toggle('on', isOn);
            row.classList.toggle('off', !isOn);

            stateElement.textContent = isOn ? 'Включено' : 'Отключено';
            timeElement.textContent = formatElapsedMs(elapsedMs);
            if (tempElement) {
                tempElement.textContent = formatTemperature(returnTemp);
            }
            if (roomElement && roomTemp !== undefined) {
                roomElement.textContent = formatTemperature(roomTemp);
            }
        }

        function loadRelayState() {
            fetch('/api/relay/state')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Ошибка получения данных реле: ' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    if (!data || !Array.isArray(data.channels)) {
                        throw new Error('Некорректные данные реле');
                    }

                    const inputElement = document.getElementById('tempInputValue');
                    if (inputElement) {
                        inputElement.textContent = formatTemperature(data.inputTemp);
                    }

                    data.channels.forEach(channel => {
                        const relay = relayChannels.find(item => item.index === channel.index);
                        if (!relay) return;

                        updateRelayRow(relay.id, !!channel.on, channel.elapsedMs || 0, channel.returnTemp, channel.roomTemp);

                        const checkbox = document.getElementById(relay.id + 'Toggle');
                        if (checkbox && !checkbox.disabled) {
                            checkbox.checked = !!channel.on;
                        }
                    });
                })
                .catch(error => {
                    console.error('Ошибка при загрузке состояния реле:', error);
                });
        }

        function toggleRelay(index, channelId) {
            const checkbox = document.getElementById(channelId + 'Toggle');
            const intendedState = checkbox ? checkbox.checked : false;

            fetch(`/api/relay/toggle?index=${index}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Ошибка управления реле: ' + response.status);
                    }
                    return response.json();
                })
                .then(data => {
                    if (!data || !data.success) {
                        throw new Error('Некорректный ответ управления реле');
                    }

                    updateRelayRow(channelId, !!data.on, data.elapsedMs || 0, data.returnTemp, undefined);

                    if (checkbox) {
                        checkbox.checked = !!data.on;
                        checkbox.disabled = false;
                    }

                    loadRelayState();
                })
                .catch(error => {
                    console.error('Ошибка при переключении реле:', error);

                    if (checkbox) {
                        checkbox.checked = !intendedState;
                        checkbox.disabled = false;
                    }

                    showMessage('Ошибка управления реле', 'error');
                });
        }

        function setupRelayControls() {
            relayChannels.forEach(relay => {
                const nameElement = document.getElementById(relay.id + 'Name');
                if (nameElement) {
                    nameElement.textContent = relay.name;
                }

                const checkbox = document.getElementById(relay.id + 'Toggle');
                if (checkbox) {
                    checkbox.checked = false;
                    checkbox.disabled = false;
                    checkbox.addEventListener('change', function() {
                        this.disabled = true;
                        toggleRelay(relay.index, relay.id);
                    });
                }

                updateRelayRow(relay.id, false, 0, null, null);
            });

            loadRelayState();
            setInterval(loadRelayState, 1000);
        }

        // Функция для установки обработчиков событий
        function setupEventHandlers() {
            setupRelayControls();
        }
        
        // Инициализация при загрузке страницы
        window.addEventListener('load', setupEventHandlers);
    </script>
</body>
</html>
