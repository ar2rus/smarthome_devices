<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smarthome Bridge WiFi</title>
    <link rel="icon" href="data:,">
    <style>
      :root {
        --bg: #edf2f7;
        --panel: #ffffff;
        --line: #cfd9e4;
        --text: #1f2937;
        --muted: #64748b;
        --primary: #1d4ed8;
        --warn: #92400e;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Trebuchet MS", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(29, 78, 216, 0.13), transparent 35%%),
          linear-gradient(180deg, #f8fbff 0%%, var(--bg) 100%%);
      }

      .card {
        width: min(760px, calc(100vw - 18px));
        margin: 7px auto;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 9px;
        text-decoration: none;
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        background: #fff;
      }

      .hint {
        margin: 5px 0 0;
        color: var(--muted);
        font-size: 11px;
      }

      .state {
        margin-top: 8px;
        padding: 7px 8px;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: #f8fbff;
        font-size: 11px;
      }

      .status {
        margin-top: 7px;
        padding: 7px 8px;
        border: 1px solid var(--line);
        border-radius: 9px;
        font-size: 11px;
        color: var(--muted);
      }

      .status.ok {
        color: #166534;
      }

      .status.error {
        color: #b42318;
      }

      .grid {
        margin-top: 8px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .full {
        grid-column: 1 / -1;
      }

      .hidden {
        display: none !important;
      }

      label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--muted);
        text-transform: uppercase;
      }

      input,
      select,
      button {
        width: 100%%;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 7px 8px;
        font: inherit;
        color: var(--text);
        background: #fff;
      }

      .check {
        flex-direction: row;
        align-items: center;
        gap: 8px;
        margin-top: 1px;
      }

      .check input {
        width: 16px;
        height: 16px;
        padding: 0;
      }

      .actions {
        margin-top: 8px;
        display: flex;
        gap: 6px;
      }

      .actions button {
        font-weight: 700;
        cursor: pointer;
      }

      #save {
        border: none;
        background: var(--primary);
        color: #fff;
      }

      #clear {
        color: var(--warn);
      }

      @media (max-width: 700px) {
        .top {
          flex-direction: column;
          align-items: flex-start;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .card {
          width: calc(100vw - 10px);
          margin: 5px auto;
          padding: 8px;
          border-radius: 9px;
        }

        h1 {
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="top">
        <h1>WiFi Configuration</h1>
        <a class="back-link" href="/log">Back to Log</a>
      </section>
      <p class="hint">In AP mode this page is opened at root `/`. In STA mode it is available at `/config`. Leave password empty to keep current saved password.</p>

      <section class="state">
        State: %WIFI_STATE% | Saved credentials: %WIFI_SAVED% | STA IP: %STA_IP% | AP: %AP_SSID% (%AP_IP%)
      </section>

      <section id="status" class="status"></section>

      <form action="/config" method="post">
        <input type="hidden" name="action" value="save">
        <section class="grid">
          <div class="field full">
            <label for="ssid">WiFi SSID</label>
            <input id="ssid" name="ssid" type="text" maxlength="32" value="%WIFI_SSID%" autocomplete="off" required>
          </div>
          <div class="field full">
            <label for="password">WiFi Password</label>
            <input id="password" name="password" type="password" maxlength="64" autocomplete="off">
          </div>
          <div class="field full check">
            <input id="useStaticIp" name="useStaticIp" type="checkbox" value="1" %USE_STATIC_IP_CHECKED%>
            <label for="useStaticIp">Use static IP configuration</label>
          </div>
          <div class="field static-field">
            <label for="ip">IP</label>
            <input id="ip" name="ip" type="text" value="%WIFI_IP%" placeholder="192.168.3.53">
          </div>
          <div class="field static-field">
            <label for="gateway">Gateway</label>
            <input id="gateway" name="gateway" type="text" value="%WIFI_GATEWAY%" placeholder="192.168.3.1">
          </div>
          <div class="field static-field">
            <label for="subnet">Subnet</label>
            <input id="subnet" name="subnet" type="text" value="%WIFI_SUBNET%" placeholder="255.255.255.0">
          </div>
          <div class="field static-field">
            <label for="dns">DNS</label>
            <input id="dns" name="dns" type="text" value="%WIFI_DNS%" placeholder="192.168.3.1">
          </div>
          <div class="field full">
            <label for="timezone">Timezone</label>
            <select id="timezone" name="timezone" required>
              <option value="">Select timezone</option>
              <option value="utc">UTC</option>
              <option value="new_york">America/New_York (UTC-5/-4)</option>
              <option value="london">Europe/London (UTC+0/+1)</option>
              <option value="tokyo">Asia/Tokyo (UTC+9)</option>
              <option value="los_angeles">America/Los_Angeles (UTC-8/-7)</option>
              <option value="berlin">Europe/Berlin (UTC+1/+2)</option>
              <option value="moscow">Europe/Moscow (UTC+3)</option>
              <option value="samara">Europe/Samara (UTC+4)</option>
              <option value="dubai">Asia/Dubai (UTC+4)</option>
              <option value="singapore">Asia/Singapore (UTC+8)</option>
              <option value="sydney">Australia/Sydney (UTC+10/+11)</option>
              <option value="chicago">America/Chicago (UTC-6/-5)</option>
              <option value="denver">America/Denver (UTC-7/-6)</option>
              <option value="phoenix">America/Phoenix (UTC-7)</option>
              <option value="honolulu">Pacific/Honolulu (UTC-10)</option>
              <option value="sao_paulo">America/Sao_Paulo (UTC-3)</option>
              <option value="mexico_city">America/Mexico_City (UTC-6)</option>
              <option value="toronto">America/Toronto (UTC-5/-4)</option>
              <option value="buenos_aires">America/Argentina/Buenos_Aires (UTC-3)</option>
              <option value="reykjavik">Atlantic/Reykjavik (UTC+0)</option>
              <option value="lisbon">Europe/Lisbon (UTC+0/+1)</option>
              <option value="paris">Europe/Paris (UTC+1/+2)</option>
              <option value="helsinki">Europe/Helsinki (UTC+2/+3)</option>
              <option value="istanbul">Europe/Istanbul (UTC+3)</option>
              <option value="cairo">Africa/Cairo (UTC+2)</option>
              <option value="johannesburg">Africa/Johannesburg (UTC+2)</option>
              <option value="nairobi">Africa/Nairobi (UTC+3)</option>
              <option value="delhi">Asia/Delhi (UTC+5:30)</option>
              <option value="dhaka">Asia/Dhaka (UTC+6)</option>
              <option value="bangkok">Asia/Bangkok (UTC+7)</option>
              <option value="jakarta">Asia/Jakarta (UTC+7)</option>
              <option value="hong_kong">Asia/Hong_Kong (UTC+8)</option>
              <option value="shanghai">Asia/Shanghai (UTC+8)</option>
              <option value="seoul">Asia/Seoul (UTC+9)</option>
              <option value="auckland">Pacific/Auckland (UTC+12/+13)</option>
              <option value="yekaterinburg">Asia/Yekaterinburg (UTC+5)</option>
              <option value="omsk">Asia/Omsk (UTC+6)</option>
              <option value="krasnoyarsk">Asia/Krasnoyarsk (UTC+7)</option>
              <option value="irkutsk">Asia/Irkutsk (UTC+8)</option>
              <option value="yakutsk">Asia/Yakutsk (UTC+9)</option>
              <option value="vladivostok">Asia/Vladivostok (UTC+10)</option>
              <option value="kamchatka">Asia/Kamchatka (UTC+12)</option>
            </select>
          </div>
        </section>

        <section class="actions">
          <button id="save" type="submit">Save and Connect</button>
        </section>
      </form>

      <form id="clearForm" action="/config" method="post" class="actions">
        <input type="hidden" name="action" value="clear">
        <button id="clear" type="submit">Clear and AP Mode</button>
      </form>
    </main>

    <script>
      (function() {
        var useStaticEl = document.getElementById("useStaticIp");
        var staticFieldNodes = document.querySelectorAll(".static-field");
        var staticIds = ["ip", "gateway", "subnet", "dns"];
        var statusEl = document.getElementById("status");
        var timezoneEl = document.getElementById("timezone");
        var clearFormEl = document.getElementById("clearForm");
        var timezoneCurrent = "%TIMEZONE_ID%";

        function setStaticEnabled(enabled) {
          for (var i = 0; i < staticFieldNodes.length; i++) {
            if (enabled) {
              staticFieldNodes[i].classList.remove("hidden");
            } else {
              staticFieldNodes[i].classList.add("hidden");
            }
          }
          for (var i = 0; i < staticIds.length; i++) {
            document.getElementById(staticIds[i]).disabled = !enabled;
          }
        }

        useStaticEl.addEventListener("change", function() {
          setStaticEnabled(useStaticEl.checked);
        });
        setStaticEnabled(useStaticEl.checked);
        if (timezoneCurrent) {
          timezoneEl.value = timezoneCurrent;
        }
        clearFormEl.addEventListener("submit", function(event) {
          if (!window.confirm("Clear saved WiFi settings and switch to AP mode?")) {
            event.preventDefault();
          }
        });

        var params = new URLSearchParams(window.location.search);
        var status = params.get("status");
        if (status === "saved") {
          statusEl.textContent = "Settings saved. Trying to connect to WiFi.";
          statusEl.classList.add("ok");
        } else if (status === "cleared") {
          statusEl.textContent = "Settings cleared. AP mode enabled.";
          statusEl.classList.add("ok");
        } else if (status === "invalid") {
          statusEl.textContent = "Invalid WiFi settings.";
          statusEl.classList.add("error");
        } else {
          statusEl.textContent = "Ready.";
        }
      })();
    </script>
  </body>
</html>
