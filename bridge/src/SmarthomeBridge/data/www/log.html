<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smarthome Bridge Log</title>
    <link rel="icon" href="data:,">
    <style>
      :root {
        --bg: #f5f7fa;
        --panel: #ffffff;
        --line: #d7dde5;
        --line-strong: #bac4d1;
        --text: #1f2937;
        --muted: #667085;
        --accent: #0f766e;
        --accent-soft: #d7f0ec;
        --warn: #9a6b05;
        --danger: #b42318;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--text);
        font-family: "Segoe UI", "Trebuchet MS", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 35%),
          linear-gradient(180deg, #f9fbff 0%, var(--bg) 100%);
      }

      .shell {
        width: min(1460px, calc(100vw - 20px));
        margin: 8px auto;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        margin-bottom: 10px;
      }

      .title {
        margin: 0;
        font-size: 21px;
        line-height: 1.1;
      }

      .subtitle {
        margin: 4px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .top-actions {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .top-link,
      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        white-space: nowrap;
        font-size: 12px;
      }

      .top-link {
        color: var(--text);
        text-decoration: none;
        font-weight: 700;
      }

      .top-button {
        cursor: pointer;
        background: #fff;
        font-family: inherit;
        font-size: 12px;
        font-weight: 700;
      }

      .status-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--warn);
        box-shadow: 0 0 0 3px rgba(154, 107, 5, 0.15);
      }

      .status.connected .status-dot {
        background: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.17);
      }

      .status.error .status-dot {
        background: var(--danger);
        box-shadow: 0 0 0 3px rgba(180, 35, 24, 0.16);
      }

      .controls,
      .request {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 6px;
      }

      .request {
        margin-top: 8px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .span-2 {
        grid-column: span 2;
      }

      .span-3 {
        grid-column: span 3;
      }

      label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--muted);
        text-transform: uppercase;
      }

      input,
      select,
      button {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 7px 8px;
        font: inherit;
        color: var(--text);
        background: #fff;
      }

      button {
        cursor: pointer;
        font-weight: 700;
      }

      .actions {
        display: flex;
        align-items: end;
      }

      .meta {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 6px;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .panel {
        margin-bottom: 8px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fcfdff;
        overflow: hidden;
      }

      .panel > summary {
        list-style: none;
        cursor: pointer;
        padding: 8px 10px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .panel > summary::-webkit-details-marker {
        display: none;
      }

      .panel > summary::after {
        content: "▾";
        margin-left: auto;
        color: var(--muted);
        font-size: 12px;
      }

      .panel:not([open]) > summary::after {
        content: "▸";
      }

      .panel-body {
        padding: 0 10px 10px;
      }

      .table-wrap {
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow: auto;
        max-height: min(60vh, 740px);
      }

      table {
        width: 100%;
        min-width: 900px;
        border-collapse: collapse;
      }

      thead th {
        position: sticky;
        top: 0;
        z-index: 1;
        padding: 6px 7px;
        font-size: 10px;
        text-align: left;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border-bottom: 1px solid var(--line-strong);
        background: #f6f9fc;
      }

      tbody td {
        padding: 6px 7px;
        font-size: 12px;
        border-bottom: 1px solid #edf1f6;
        vertical-align: top;
      }

      tbody tr:nth-child(odd) {
        background: #fafcff;
      }

      .mono {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 11px;
      }

      .tag {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 11px;
        font-weight: 700;
      }

      .empty {
        padding: 18px 10px;
        text-align: center;
        color: var(--muted);
      }

      pre {
        margin: 8px 0 0;
        padding: 9px;
        border-radius: 10px;
        border: 1px solid #c5d0dd;
        background: #f2f6fb;
        color: #142232;
        max-height: 230px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 12px;
      }

      @media (max-width: 980px) {
        .topbar,
        .meta {
          flex-direction: column;
          align-items: flex-start;
        }

        .top-actions {
          width: 100%;
          flex-wrap: wrap;
        }

        .controls,
        .request {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .span-2,
        .span-3,
        .actions {
          grid-column: span 2;
        }

        .shell {
          width: calc(100vw - 10px);
          margin: 5px auto;
          padding: 8px;
          border-radius: 10px;
        }

        .title {
          font-size: 18px;
        }

        .subtitle {
          font-size: 11px;
        }

        .table-wrap {
          max-height: 50vh;
        }
      }

      @media (max-width: 640px) {
        .top-link,
        .status {
          padding: 5px 9px;
          font-size: 11px;
        }

        table {
          min-width: 760px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1 class="title">Smarthome Bridge Log</h1>
          <p class="subtitle">Live events monitor and request console.</p>
        </div>
        <div class="top-actions">
          <button id="discovery-btn" class="top-link top-button" type="button">Discovery</button>
          <a class="top-link" href="/config">WiFi Config</a>
          <a class="top-link" href="/flash">Flash Firmware...</a>
          <div id="status" class="status">
            <span class="status-dot"></span>
            <span id="status-text">Reconnecting...</span>
          </div>
        </div>
      </section>

      <details class="panel" id="filters-panel">
        <summary>Search</summary>
        <div class="panel-body">
          <section class="controls">
            <div class="field span-2">
              <label for="search">Search</label>
              <input id="search" type="search" placeholder="Search device, command, hex payload, decoded text">
            </div>
            <div class="field">
              <label for="source-filter">Source</label>
              <select id="source-filter"><option value="">All sources</option></select>
            </div>
            <div class="field">
              <label for="destination-filter">Destination</label>
              <select id="destination-filter"><option value="">All destinations</option></select>
            </div>
            <div class="field">
              <label for="command-filter">Command</label>
              <select id="command-filter"><option value="">All commands</option></select>
            </div>
            <div class="actions">
              <button id="clear-btn" type="button">Clear Log</button>
            </div>
          </section>
        </div>
      </details>

      <details class="panel" id="request-panel">
        <summary>Request / Response</summary>
        <div class="panel-body">
          <div class="request">
            <div class="field">
              <label for="req-device">Device (a)</label>
              <select id="req-device"><option value="255">255 - BROADCAST</option></select>
            </div>
            <div class="field">
              <label for="req-command">Command (c)</label>
              <select id="req-command"><option value="">Select command</option></select>
            </div>
            <div class="field span-2">
              <label for="req-data">HEX data (d)</label>
              <input id="req-data" type="text" placeholder="Optional, e.g. 0102A0">
            </div>
            <div class="field">
              <label for="req-timeout">Timeout ms (t)</label>
              <input id="req-timeout" type="number" min="10" max="10000" value="250">
            </div>
            <div class="field">
              <label for="req-response-command">Response cmd (r)</label>
              <input id="req-response-command" type="number" min="-1" max="255" placeholder="Optional">
            </div>
            <div class="actions span-3">
              <button id="request-send" type="button">Send /request</button>
            </div>
          </div>
          <pre id="request-output">Ready.</pre>
        </div>
      </details>

      <section class="meta">
        <div id="rows-state">0 rows</div>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Source</th>
              <th>Destination</th>
              <th>Command</th>
              <th>Data</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="6" class="empty">Waiting for live data...</td></tr>
          </tbody>
        </table>
      </section>
    </main>

    <script>
      var registry = { commands: {}, devices: {} };
      var rows = [];
      var eventSource = null;
      var reconnectTimer = null;
      var reconnectDelayMs = 1200;
      var lastEventAt = 0;
      var lastHeartbeatAt = 0;
      var connectStateAt = 0;
      var connectStallTimeoutMs = 6000;
      var heartbeatTimeoutMs = 7000;
      var pageNavigating = false;

      var sourceSelect = document.getElementById("source-filter");
      var destinationSelect = document.getElementById("destination-filter");
      var commandSelect = document.getElementById("command-filter");
      var searchInput = document.getElementById("search");
      var rowsContainer = document.getElementById("rows");
      var rowsState = document.getElementById("rows-state");
      var statusNode = document.getElementById("status");
      var statusText = document.getElementById("status-text");
      var reqOutput = document.getElementById("request-output");
      var discoveryButton = document.getElementById("discovery-btn");
      var discoveryPending = false;

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function codeToHex(value) {
        var number = Number(value);
        if (Number.isNaN(number)) {
          return String(value);
        }
        return "0x" + number.toString(16).toUpperCase().padStart(2, "0");
      }

      function formatCode(code, registryMap) {
        var label = registryMap[String(code)];
        return "[" + codeToHex(code) + "]" + (label ? " " + label : "");
      }

      function formatTime(value) {
        if (!value) {
          return "";
        }

        var timestamp = Number(value);
        if (Number.isNaN(timestamp)) {
          return String(value);
        }

        var date = new Date(timestamp);
        var ms = String(date.getMilliseconds()).padStart(3, "0");
        return date.toLocaleString() + "." + ms;
      }

      function formatMessage(message) {
        if (!message || !message.obj) {
          return "";
        }

        if (typeof message.obj.val !== "undefined") {
          return String(message.obj.val);
        }

        if (Array.isArray(message.obj.sensors)) {
          return message.obj.sensors.map(function(sensor) {
            var parts = [];
            if (typeof sensor.id !== "undefined") { parts.push("id=" + sensor.id); }
            if (typeof sensor.type !== "undefined") { parts.push("type=" + sensor.type); }
            if (typeof sensor.val !== "undefined") { parts.push("val=" + sensor.val); }
            return parts.join(" ");
          }).join(" | ");
        }

        if (Array.isArray(message.obj.switches)) {
          return message.obj.switches.map(function(item) {
            return "id=" + item.id + " val=" + item.val;
          }).join(" | ");
        }

        try {
          return JSON.stringify(message.obj);
        } catch (error) {
          return "";
        }
      }

      function buildSearchText(row) {
        return [
          formatCode(row.s, registry.devices),
          formatCode(row.d, registry.devices),
          formatCode(row.c, registry.commands),
          row.m && row.m.hex ? row.m.hex : "",
          formatMessage(row.m)
        ].join(" ").toLowerCase();
      }

      function renderSelect(selectNode, registryMap, placeholder) {
        var current = selectNode.value;
        var options = Object.keys(registryMap).map(function(key) { return Number(key); })
          .sort(function(a, b) { return a - b; });

        selectNode.innerHTML = "";
        selectNode.appendChild(new Option(placeholder, ""));
        options.forEach(function(code) {
          selectNode.appendChild(new Option(formatCode(code, registryMap), String(code)));
        });

        if (current !== "") {
          selectNode.value = current;
        }
      }

      function renderRequestSelects() {
        var reqDevice = document.getElementById("req-device");
        var reqCommand = document.getElementById("req-command");

        var currentDevice = reqDevice.value;
        var currentCommand = reqCommand.value;

        reqDevice.innerHTML = "";
        Object.keys(registry.devices).map(function(key) { return Number(key); })
          .sort(function(a, b) { return a - b; })
          .forEach(function(code) {
            reqDevice.appendChild(new Option(code + " - " + (registry.devices[String(code)] || ""), String(code)));
          });

        reqCommand.innerHTML = "<option value=\"\">Select command</option>";
        Object.keys(registry.commands).map(function(key) { return Number(key); })
          .sort(function(a, b) { return a - b; })
          .forEach(function(code) {
            reqCommand.appendChild(new Option(code + " - " + (registry.commands[String(code)] || ""), String(code)));
          });

        if (currentDevice && reqDevice.querySelector("option[value=\"" + currentDevice + "\"]")) {
          reqDevice.value = currentDevice;
        } else if (reqDevice.querySelector("option[value=\"255\"]")) {
          reqDevice.value = "255";
        }

        if (currentCommand && reqCommand.querySelector("option[value=\"" + currentCommand + "\"]")) {
          reqCommand.value = currentCommand;
        }
      }

      function syncRegistryFilters() {
        renderSelect(sourceSelect, registry.devices, "All sources");
        renderSelect(destinationSelect, registry.devices, "All destinations");
        renderSelect(commandSelect, registry.commands, "All commands");
        renderRequestSelects();
      }

      function renderRows() {
        var sourceFilter = sourceSelect.value;
        var destinationFilter = destinationSelect.value;
        var commandFilter = commandSelect.value;
        var searchFilter = searchInput.value.trim().toLowerCase();

        var filtered = rows.filter(function(row) {
          if (sourceFilter && String(row.s) !== sourceFilter) { return false; }
          if (destinationFilter && String(row.d) !== destinationFilter) { return false; }
          if (commandFilter && String(row.c) !== commandFilter) { return false; }
          if (searchFilter && buildSearchText(row).indexOf(searchFilter) === -1) { return false; }
          return true;
        });

        rowsState.textContent = filtered.length + " shown / " + rows.length + " total";

        if (!filtered.length) {
          rowsContainer.innerHTML = "<tr><td colspan=\"6\" class=\"empty\">No rows match current filters.</td></tr>";
          return;
        }

        rowsContainer.innerHTML = filtered.map(function(row) {
          var hex = row.m && row.m.hex ? row.m.hex : "";
          var message = formatMessage(row.m);
          return "<tr>" +
            "<td class=\"mono\">" + escapeHtml(formatTime(row.t)) + "</td>" +
            "<td>" + escapeHtml(formatCode(row.s, registry.devices)) + "</td>" +
            "<td>" + escapeHtml(formatCode(row.d, registry.devices)) + "</td>" +
            "<td><span class=\"tag\">" + escapeHtml(formatCode(row.c, registry.commands)) + "</span></td>" +
            "<td class=\"mono\">" + escapeHtml(hex) + "</td>" +
            "<td>" + escapeHtml(message) + "</td>" +
            "</tr>";
        }).join("");
      }

      function appendEvents(batch) {
        if (!Array.isArray(batch)) {
          return;
        }
        for (var i = batch.length - 1; i >= 0; i -= 1) {
          rows.unshift(batch[i]);
        }
        if (rows.length > 1000) {
          rows.length = 1000;
        }
        renderRows();
      }

      function setStatus(kind, text) {
        if (pageNavigating) {
          return;
        }
        statusNode.className = "status" + (kind ? " " + kind : "");
        statusText.textContent = text;
      }

      function setConnectionState(state) {
        if (state === "connected") {
          setStatus("connected", "Connected");
          return;
        }
        if (state === "disconnected") {
          setStatus("error", "Disconnected");
          return;
        }
        setStatus("", "Reconnecting...");
      }

      function scheduleReconnect(reason, asError) {
        if (pageNavigating) {
          return;
        }
        if (reconnectTimer) {
          return;
        }
        setConnectionState(asError ? "disconnected" : "reconnecting");
        reconnectTimer = setTimeout(function() {
          reconnectTimer = null;
          connectEvents();
        }, reconnectDelayMs);
      }

      function connectEvents() {
        if (!window.EventSource) {
          setConnectionState("disconnected");
          return;
        }

        if (eventSource) {
          try { eventSource.close(); } catch (e) {}
          eventSource = null;
        }

        eventSource = new EventSource("/events");
        connectStateAt = Date.now();
        setConnectionState("reconnecting");

        eventSource.addEventListener("open", function() {
          if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
          }
          connectStateAt = Date.now();
          lastEventAt = Date.now();
          lastHeartbeatAt = lastEventAt;
          setConnectionState("connected");
        });

        eventSource.addEventListener("error", function() {
          if (pageNavigating) {
            return;
          }
          if (!eventSource) {
            return;
          }
          if (eventSource.readyState === EventSource.CONNECTING) {
            setConnectionState("reconnecting");
            return;
          }
          setConnectionState("disconnected");
          scheduleReconnect("", true);
        });

        eventSource.addEventListener("SERVICE", function() {
          lastHeartbeatAt = Date.now();
          lastEventAt = lastHeartbeatAt;
        });

        eventSource.addEventListener("DATA", function(event) {
          lastEventAt = Date.now();
          lastHeartbeatAt = lastEventAt;
          try {
            appendEvents(JSON.parse(event.data));
          } catch (error) {
            setConnectionState("disconnected");
          }
        });
      }

      function loadRegistries() {
        return Promise.all([
          fetch("/registry/commands").then(function(response) { return response.json(); }),
          fetch("/registry/devices").then(function(response) { return response.json(); })
        ]).then(function(result) {
          registry.commands = result[0] || {};
          registry.devices = result[1] || {};
          syncRegistryFilters();
          renderRows();
        }).catch(function(error) {
          reqOutput.textContent = "Registry loading failed: " + error.message;
        });
      }

      function sendRequest() {
        var command = document.getElementById("req-command").value;
        if (!command) {
          reqOutput.textContent = "Select command first.";
          return;
        }

        var params = new URLSearchParams();
        params.set("c", command);
        params.set("a", document.getElementById("req-device").value || "255");

        var hex = document.getElementById("req-data").value.trim();
        if (hex) {
          params.set("d", hex);
        }

        var timeout = document.getElementById("req-timeout").value.trim();
        if (timeout) {
          params.set("t", timeout);
        }

        var responseCommand = document.getElementById("req-response-command").value.trim();
        if (responseCommand) {
          params.set("r", responseCommand);
        }

        reqOutput.textContent = "Sending...";
        fetch("/request?" + params.toString())
          .then(function(response) {
            return response.text().then(function(text) {
              if (!response.ok) {
                throw new Error(text || ("HTTP " + response.status));
              }
              return text;
            });
          })
          .then(function(text) {
            try {
              reqOutput.textContent = JSON.stringify(JSON.parse(text), null, 2);
            } catch (e) {
              reqOutput.textContent = text;
            }
          })
          .catch(function(error) {
            reqOutput.textContent = "Request error: " + error.message;
          });
      }

      function sendDiscovery() {
        if (discoveryPending) {
          reqOutput.textContent = "Discovery is already running...";
          return;
        }

        discoveryPending = true;
        discoveryButton.disabled = true;
        reqOutput.textContent = "Sending /discovery...";
        fetch("/discovery")
          .then(function(response) {
            return response.text().then(function(text) {
              if (!response.ok) {
                throw new Error(text || ("HTTP " + response.status));
              }
              return text;
            });
          })
          .then(function(text) {
            try {
              reqOutput.textContent = JSON.stringify(JSON.parse(text), null, 2);
            } catch (e) {
              reqOutput.textContent = text;
            }
          })
          .catch(function(error) {
            reqOutput.textContent = "Discovery error: " + error.message;
          })
          .finally(function() {
            discoveryPending = false;
            discoveryButton.disabled = false;
          });
      }

      sourceSelect.addEventListener("change", renderRows);
      destinationSelect.addEventListener("change", renderRows);
      commandSelect.addEventListener("change", renderRows);
      searchInput.addEventListener("input", renderRows);
      document.getElementById("clear-btn").addEventListener("click", function() {
        rows = [];
        renderRows();
      });
      document.getElementById("request-send").addEventListener("click", sendRequest);
      discoveryButton.addEventListener("click", sendDiscovery);
      document.querySelectorAll("a.top-link").forEach(function(node) {
        node.addEventListener("click", function() {
          pageNavigating = true;
        });
      });

      setInterval(function() {
        if (pageNavigating) {
          return;
        }
        if (!eventSource) {
          scheduleReconnect("", false);
          return;
        }

        if (eventSource.readyState === EventSource.CLOSED) {
          scheduleReconnect("", true);
          return;
        }

        if (eventSource.readyState === EventSource.CONNECTING && (Date.now() - connectStateAt > connectStallTimeoutMs)) {
          try { eventSource.close(); } catch (e) {}
          eventSource = null;
          scheduleReconnect("", true);
          return;
        }

        if (eventSource.readyState === EventSource.OPEN && lastHeartbeatAt && (Date.now() - lastHeartbeatAt > heartbeatTimeoutMs)) {
          try { eventSource.close(); } catch (e) {}
          eventSource = null;
          scheduleReconnect("", true);
        }
      }, 2000);

      window.addEventListener("online", function() {
        scheduleReconnect("", false);
      });
      window.addEventListener("beforeunload", function() {
        pageNavigating = true;
        if (eventSource) {
          try { eventSource.close(); } catch (e) {}
        }
      });

      loadRegistries();
      connectEvents();
      renderRows();
    </script>
  </body>
</html>
